<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .box { background: rgba(26,26,46,0.95); padding: 40px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center; width: 340px; }
    .box h1 { color: #9146ff; margin-bottom: 8px; font-size: 22px; }
    .box p { color: #888; margin-bottom: 25px; font-size: 14px; }
    .box input { width: 100%; padding: 12px; border: 2px solid #333; border-radius: 8px; background: #16213e; color: #fff; font-size: 15px; margin-bottom: 15px; outline: none; }
    .box input:focus { border-color: #9146ff; }
    .box button { width: 100%; padding: 12px; background: #9146ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .box button:hover { background: #7c3aed; }
    .err { color: #f44336; margin-top: 10px; display: none; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🎮 Twitch Bot</h1>
    <p>Введите пароль</p>
    <input type="password" id="pass" placeholder="Пароль" autofocus>
    <button onclick="login()">Войти</button>
    <p class="err" id="err">Неверный пароль</p>
  </div>
  <script>
    document.getElementById("pass").onkeypress = e => { if (e.key === "Enter") login(); };
    async function login() {
      const pass = document.getElementById("pass").value;
      const r = await fetch("/api/status", { headers: { "x-pass": pass } });
      if (r.ok) { localStorage.setItem("pass", pass); window.location.href = "/admin?pass=" + encodeURIComponent(pass); }
      else document.getElementById("err").style.display = "block";
    }
    const s = localStorage.getItem("pass");
    if (s) fetch("/api/status", { headers: { "x-pass": s } }).then(r => { if (r.ok) window.location.href = "/admin?pass=" + encodeURIComponent(s); });
  </script>
</body>
</html>
